name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write

    strategy:
      matrix:
        platform: [x64, ARM64]

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          dotnet-quality: 'preview'

      - name: Set Version in Manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') { $version = "$version.0" }
          (Get-Content src/Mo/Package.appxmanifest) -replace 'Version="[\d.]+"', "Version=`"$version`"" |
            Set-Content src/Mo/Package.appxmanifest

      # ZIP (portable) — .NET 10
      - name: Publish (portable)
        run: dotnet publish src/Mo/Mo.csproj -c Release -p:Platform=${{ matrix.platform }} -p:PublishReadyToRun=true -p:PublishTrimmed=true -p:WindowsPackageType=None -p:EnableMsixTooling=false -o publish/${{ matrix.platform }}
        timeout-minutes: 15

      - name: Create ZIP
        run: Compress-Archive -Path publish/${{ matrix.platform }}/* -DestinationPath Mo-${{ github.ref_name }}-${{ matrix.platform }}.zip

      # MSIX — .NET 8 SDK (BuildTools.MSIX has .NET 10 compatibility issue)
      - name: Create global.json for .NET 8
        shell: pwsh
        run: |
          $sdk8 = dotnet --list-sdks | Where-Object { $_ -match "^8\." } | ForEach-Object { ($_ -split " ")[0] } | Select-Object -Last 1
          Write-Host "Using .NET 8 SDK: $sdk8"
          '{"sdk":{"version":"' + $sdk8 + '","rollForward":"latestFeature"}}' | Set-Content global.json

      - name: Build MSIX (unsigned)
        shell: pwsh
        run: |
          dotnet build src/Mo/Mo.csproj -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxBundle=Never `
            -p:AppxPackageSigningEnabled=false `
            -p:AppxPackageDir=msix-unsigned/

      - name: Rename unsigned MSIX
        shell: pwsh
        run: |
          $msix = Get-ChildItem -Path msix-unsigned -Filter "*.msix" -Recurse | Select-Object -First 1
          if ($msix) {
            Copy-Item $msix.FullName "Mo-${{ github.ref_name }}-${{ matrix.platform }}-unsigned.msix"
          }

      - name: Build and sign MSIX
        if: env.SIGNING_CERT_BASE64 != ''
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:SIGNING_CERT_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP "signing_cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          dotnet build src/Mo/Mo.csproj -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxBundle=Never `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateKeyFile=$certPath `
            -p:PackageCertificatePassword=$env:SIGNING_CERT_PASSWORD `
            -p:AppxPackageSigningTimestampServerUrl=http://timestamp.digicert.com `
            -p:AppxPackageSigningTimestampDigestAlgorithm=SHA512 `
            -p:AppxPackageDir=msix-signed/

          Remove-Item $certPath -Force

      - name: Rename signed MSIX
        if: env.SIGNING_CERT_BASE64 != ''
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
        run: |
          $msix = Get-ChildItem -Path msix-signed -Filter "*.msix" -Recurse | Select-Object -First 1
          if ($msix) {
            Copy-Item $msix.FullName "Mo-${{ github.ref_name }}-${{ matrix.platform }}.msix"
          }

      - name: Remove global.json
        run: Remove-Item global.json -ErrorAction SilentlyContinue

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Mo ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            Mo-${{ github.ref_name }}-${{ matrix.platform }}.zip
            Mo-${{ github.ref_name }}-${{ matrix.platform }}-unsigned.msix
            Mo-${{ github.ref_name }}-${{ matrix.platform }}.msix
          generate_release_notes: true
